<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Pet Triangle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body ontouchstart="">
        <header id="top-nav">
            <h1 class="hero">Pet Triangle</h1>
            <p>💛 JC</p>
        </header>

        <main>
            <input type="text" id="pet-name" max="30" placeholder="Pet name">
            <input type="color" id="pet-color">

            <svg viewBox="0 0 2048 2048" id="pet">
                <g transform="matrix(2.443914,0,0,2.443914,-1478.568019,-1478.568019)">
                    <path d="M1024,605L1443,1443L605,1443L1024,605Z" />
                </g>
            </svg>

            <div id="actions-container">
                <button id="feed" class="action">🍎</button>
                <button id="drink" class="action">🥤</button>
                <button id="play" class="action">🛝</button>
            </div>
        </main>
    </body>
</html>
