<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Pet Triangle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>

    <body ontouchstart="">
        <header id="top-nav">
            <h1 class="hero">Pet Triangle</h1>
            <p>💛 JC</p>
        </header>

        <main>
            <input type="text" id="pet-name" max="30" placeholder="Pet name">

            <svg viewBox="0 0 2048 2048" id="pet">
                <g transform="matrix(2.443914,0,0,2.443914,-1478.568019,-1478.568019)">
                    <path d="M1024,605L1443,1443L605,1443L1024,605Z" />
                </g>
            </svg>

            <div id="actions-container">
                <input type="color" id="pet-color">
                <div id="button-row">
                    <button id="feed" class="action">
                        🍎
                        <span id="food-count">0</span>
                    </button>
                    <button id="drink" class="action">
                        🥤
                        <span id="drink-count">0</span>
                    </button>
                    <button id="play" class="action">
                        🛝
                        <span id="play-count">0</span>
                    </button>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
